  name: Deploy

  on:
    repository_dispatch:
      types: [deploy]
    workflow_dispatch:
      inputs:
        ref:
          description: 'Branch to deploy'
          required: true
          default: 'main'

  permissions:
    pages: write
    id-token: write

  jobs:
    export-and-deploy:
      runs-on: ubuntu-latest
      container:
        image: barichello/godot-ci:4.6.2
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      steps:
        - name: Checkout Carters-Games
          uses: actions/checkout@v4
          with:
            repository: abroederdorf/Carters-Games
            ref: ${{ github.event.client_payload.ref || inputs.ref }}
            token: ${{ secrets.PAT }}

        - name: Setup export templates
          run: |
            mkdir -v -p ~/.local/share/godot/export_templates/
            cp -r /root/.local/share/godot/export_templates/. ~/.local/share/godot/export_templates/

        - name: Export
          run: |
            mkdir -v -p web
            godot --headless --export-release "Web" web/index.html

        - name: Upload Pages artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: web/

        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
